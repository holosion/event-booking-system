{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="section auth-section">
    <div class="container narrow">
        <div class="form-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to manage your bookings.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {% for field in form %}
                <div class="field {% if field.errors %}field-error{% endif %}">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<span class="error-text">{{ error }}</span>{% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary btn-block btn-lg">Log in</button>
            </form>
            <p class="form-footer">New here? <a href="{% url 'register' %}">Create an account</a></p>
        </div>
    </div>
</section>
{% endblock %}
