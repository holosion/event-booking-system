{% extends 'base.html' %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<section class="section">
    <div class="container narrow">
        <div class="form-card">
            <h1>Delete category?</h1>
            <p>Remove <strong>{{ category.name }}</strong>? Events in this category may be affected.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'manage_categories' %}" class="btn btn-ghost">Cancel</a>
            </form>
        </div>
    </div>
</section>
{% endblock %}
