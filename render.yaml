databases:
  - name: eventbook-db
    plan: free
    databaseName: eventbook
    user: eventbook

services:
  - type: web
    name: event-booking-system
    runtime: python
    plan: free
    buildCommand: './build.sh'
    startCommand: 'gunicorn eventbooking.wsgi:application'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventbook-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: PYTHON_VERSION
        value: '3.12.3'
      - key: WEB_CONCURRENCY
        value: '2'
